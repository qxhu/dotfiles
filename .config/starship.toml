add_newline = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 4
truncate_to_repo = true

[git_branch]
format = "[$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
staged = '+${count} '
modified = '!${count} '
untracked = '?${count} '
deleted = '-${count} '
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇡${ahead_count}⇣${behind_count}'

[nodejs]
format = "[$version]($style) "

[python]
format = "[$version]($style) "

[cmd_duration]
min_time = 2_000
format = "[$duration]($style) "
